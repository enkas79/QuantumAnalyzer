name: CI (Test)

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout del codice
      uses: actions/checkout@v4

    - name: Installazione Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # I test GUI (pytest-qt) girano headless con il platform plugin
    # "offscreen": servono comunque le librerie di sistema di Qt.
    - name: Dipendenze di sistema per Qt headless
      run: |
        sudo apt-get update
        sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3 libfontconfig1

    - name: Installazione del pacchetto (core + gui + dev)
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,gui]"

    - name: Esecuzione test (pytest)
      env:
        QT_QPA_PLATFORM: offscreen
      run: pytest -q
